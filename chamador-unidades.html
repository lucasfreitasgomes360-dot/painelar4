<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Chamador - USF Aero Rancho IV</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #003366;
            --secondary: #007bff;
            --success: #28a745;
            --warning: #ff8c00;
            --info: #17a2b8;
            --danger: #dc3545;
            --light: #f8f9fa;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #eef2f7; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0; 
        }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 450px; 
            border-top: 10px solid var(--primary);
        }

        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; font-size: 1.6rem; }

        .card-setor {
            background: var(--light);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
        }

        label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--primary); text-transform: uppercase; }

        select, input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 10px; 
            border: 2px solid #ddd; 
            box-sizing: border-box; 
            font-size: 1rem; 
            margin-bottom: 10px;
        }

        .btn {
            border: none; border-radius: 10px; padding: 15px; font-weight: bold;
            font-size: 1rem; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 10px; color: white; text-transform: uppercase;
            width: 100%; margin-bottom: 10px; transition: filter 0.2s;
        }
        .btn:hover { filter: brightness(1.1); }
        .btn-blue { background: var(--secondary); }
        .btn-orange { background: var(--warning); }
        .btn-green { background: var(--success); }
        .btn-info { background: var(--info); }
        .btn-purple { background: #6f42c1; }

        .flex-row { display: flex; gap: 10px; }
        .flex-row .btn { width: 50%; }

        .status-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            background: #fff3cd; padding: 15px; border-radius: 12px;
            margin-bottom: 20px; border: 1px solid #ffeeba; text-align: center;
        }
        .status-item { font-size: 0.85rem; color: #856404; }
        .status-item b { font-size: 1.1rem; color: #000; }

        .hist-container { margin-top: 25px; border-top: 2px dashed #ddd; padding-top: 20px; }
        .hist-item { 
            background: #fff; border: 1px solid #eee; padding: 12px; 
            border-radius: 10px; margin-bottom: 10px; display: flex; 
            justify-content: space-between; align-items: center;
        }
        .btn-rechamada { background: #f1f3f5; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; color: var(--secondary); cursor: pointer; }

        #toast { 
            visibility: hidden; min-width: 250px; background: #333; color: #fff; text-align: center; 
            border-radius: 30px; padding: 16px; position: fixed; z-index: 10; top: 30px; 
            left: 50%; transform: translateX(-50%); opacity: 0; transition: 0.5s; 
        }
        #toast.show { visibility: visible; opacity: 1; top: 50px; }

        /* Estilo para lista de avisos na gerência */
        .aviso-item-gerencia { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="toast">Operação realizada!</div>

    <div class="container">
        <h2>🏥 USF Aero Rancho IV</h2>
        
        <div class="card-setor">
            <label>Selecione seu Setor</label>
            <select id="categoria" onchange="trocouCategoria()">
                <option value="">-- Escolha o Setor --</option>
                <option value="acolhimento">🎫 ACOLHIMENTO</option>
                <option value="recepcao">🏢 RECEPÇÃO</option>
                <option value="medico">🩺 MÉDICO</option>
                <option value="enfermagem">💉 ENFERMAGEM</option>
                <option value="odonto">🦷 ODONTOLOGIA</option>
                <option value="auditorio">📢 AUDITÓRIO</option>
                <option value="servico_social">🤝 SERVIÇO SOCIAL</option>
                <option value="gerencia">⚙️ GERÊNCIA</option>
            </select>
        </div>

        <div id="areaChamada" style="display:none">
            
            <div id="painelStatus" class="status-grid" style="display:none">
                <div class="status-item">Normal: <b id="stNormal">0</b></div>
                <div class="status-item">Pref: <b id="stPref">0</b></div>
                <div class="status-item">Coleta: <b id="stColeta">0</b></div>
                <div class="status-item">Odonto: <b id="stOdonto">0</b></div>
            </div>

            <div id="interfaceAcolhimento" style="display:none">
                <label>Últimas Senhas Entregues</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="number" id="inputNormal" placeholder="Normal">
                    <input type="number" id="inputPref" placeholder="Pref">
                    <input type="number" id="inputColeta" placeholder="Coleta">
                    <input type="number" id="inputOdonto" placeholder="Odonto">
                </div>
                <button class="btn btn-green" onclick="atualizarEntregues()">✅ Sincronizar Senhas</button>
            </div>

            <div id="selecaoSala">
                <label>Sua Sala/Local</label>
                <select id="minhaSala" onchange="configurarTela()"></select>
            </div>

            <div id="interfaceRecepcao" style="display:none; margin-top: 15px;">
                <div class="flex-row">
                    <button class="btn btn-blue" onclick="gerarSenha('NORMAL', 'SENHA')">🟦 NORMAL</button>
                    <button class="btn btn-orange" onclick="gerarSenha('PREFERENCIAL', 'SENHA PREF.')">🟧 PREF.</button>
                </div>
                <button class="btn btn-info" onclick="gerarSenha('ODONTO', 'SENHA ODONTO')">🦷 ODONTOLOGIA</button>
            </div>

            <div id="interfaceColeta" style="display:none; margin-top:15px;">
                <button class="btn btn-purple" onclick="gerarSenha('COLETA', 'SENHA COLETA')">🧪 CHAMAR COLETA</button>
            </div>

            <div id="interfaceNome" style="display:none; margin-top: 15px;">
                <label>Nome do Paciente</label>
                <input type="text" id="nomePaciente" placeholder="Digite o nome completo...">
                <button class="btn btn-green" onclick="enviarChamadaNome()">📣 CHAMAR NA TV</button>
            </div>

            <div id="interfaceAvisos" style="display:none; margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px;">
                <label>Mensagem para TV</label>
                <input type="text" id="inputAvisoUnidade" placeholder="O que vai aparecer na TV...">
                <label>Cor do Card</label>
                <input type="color" id="corAviso" value="#007bff" style="height: 50px;">
                <input type="hidden" id="editAvisoKey">
                <button id="btnSalvarAviso" class="btn btn-blue" onclick="salvarAvisoTV()">💾 SALVAR AVISO</button>
                <div id="listaAvisosGerencia" style="margin-top:15px;"></div>
            </div>

            <div class="hist-container" id="sessaoHistorico" style="display:none">
                <label>Últimos Chamados: <span id="nomeSalaHistorico" style="color:var(--secondary)"></span></label>
                <div id="listaHistorico"></div>
            </div>
            
            <p style="text-align:center; color:#aaa; font-size:0.7rem; cursor:pointer; margin-top:20px;" onclick="resetContadores()">Reiniciar sistema</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB-LPsGPEGcjMRPcEReNDQdgFWE5iE7Bh0",
            authDomain: "usf-aero-rancho-b6d85.firebaseapp.com",
            projectId: "usf-aero-rancho-b6d85",
            databaseURL: "https://usf-aero-rancho-b6d85-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let historicosPorSala = {};

        const config = {
            acolhimento: { salas: ["Mesa Acolhimento"], tipo: 'acolhimento' },
            recepcao: { salas: ["Recepção 01", "Recepção 02", "Recepção 03"], tipo: 'botoes' },
            medico: { salas: ["Consultório 01", "Consultório 03", "Consultório 04"], tipo: 'nome' },
            enfermagem: { salas: ["Triagem", "Consultório 02", "Sala de Vacina", "Sala de Coleta", "Sala de Curativo"], tipo: 'nome' },
            odonto: { salas: ["Odontologia"], tipo: 'nome' },
            auditorio: { salas: ["Auditório"], tipo: 'nome' },
            servico_social: { salas: ["Serviço Social"], tipo: 'nome' },
            gerencia: { salas: ["Gerência"], tipo: 'nome' }
        };

        function mostrarToast(msg) {
            const t = document.getElementById("toast"); t.innerText = msg;
            t.className = "show"; setTimeout(() => { t.className = ""; }, 3000);
        }

        database.ref('acolhimento').on('value', snap => {
            const d = snap.val() || {normal:0, pref:0, coleta:0, odonto:0};
            document.getElementById('stNormal').innerText = d.normal;
            document.getElementById('stPref').innerText = d.pref;
            document.getElementById('stColeta').innerText = d.coleta;
            document.getElementById('stOdonto').innerText = d.odonto;
            if(document.getElementById('categoria').value === 'acolhimento'){
                document.getElementById('inputNormal').value = d.normal;
                document.getElementById('inputPref').value = d.pref;
                document.getElementById('inputColeta').value = d.coleta;
                document.getElementById('inputOdonto').value = d.odonto;
            }
        });

        function trocouCategoria() {
            const cat = document.getElementById('categoria').value;
            const selSala = document.getElementById('minhaSala');
            if (!cat) { document.getElementById('areaChamada').style.display="none"; return; }
            selSala.innerHTML = "";
            config[cat].salas.forEach(s => { 
                let o = document.createElement('option'); o.value = s; o.innerText = s; selSala.appendChild(o); 
            });
            configurarTela();
        }

        function configurarTela() {
            const cat = document.getElementById('categoria').value;
            const salaAtual = document.getElementById('minhaSala').value;
            document.getElementById('interfaceAcolhimento').style.display = (cat === 'acolhimento') ? 'block' : 'none';
            document.getElementById('interfaceRecepcao').style.display = (cat === 'recepcao') ? 'block' : 'none';
            document.getElementById('interfaceNome').style.display = (config[cat].tipo === 'nome') ? 'block' : 'none';
            document.getElementById('interfaceAvisos').style.display = (cat === 'gerencia') ? 'block' : 'none';
            document.getElementById('interfaceColeta').style.display = (salaAtual === "Sala de Coleta") ? 'block' : 'none';
            document.getElementById('selecaoSala').style.display = (cat === 'acolhimento') ? 'none' : 'block';
            document.getElementById('sessaoHistorico').style.display = (cat !== 'acolhimento') ? 'block' : 'none';
            document.getElementById('painelStatus').style.display = (cat === 'recepcao' || salaAtual === "Sala de Coleta") ? 'block' : 'none';
            document.getElementById('areaChamada').style.display = "block";
            renderizarHistorico();
            if(cat === 'gerencia') atualizarListaAvisos();
        }

        function gerarSenha(key, prefixo) {
            database.ref('contador/' + key).transaction(v => (v || 0) + 1, (err, comm, snap) => {
                if (comm) { enviarParaFirebase(`${prefixo} ${String(snap.val()).padStart(2, '0')}`); mostrarToast("Senha enviada!"); }
            });
        }

        function enviarChamadaNome() {
            const input = document.getElementById('nomePaciente');
            if(input.value.trim() !== "") { enviarParaFirebase(input.value.trim()); input.value = ""; mostrarToast("Chamado enviado!"); }
        }

        function enviarParaFirebase(texto) {
            const sala = document.getElementById('minhaSala').value;
            database.ref('fila_chamadas').push({ msg: texto, local: sala, hora: Date.now() });
            if (!historicosPorSala[sala]) historicosPorSala[sala] = [];
            historicosPorSala[sala].unshift({ texto: texto, hora: new Date().toLocaleTimeString() });
            if(historicosPorSala[sala].length > 5) historicosPorSala[sala].pop();
            renderizarHistorico();
        }

        function renderizarHistorico() {
            const sala = document.getElementById('minhaSala').value;
            const lista = document.getElementById('listaHistorico');
            if(!lista) return; lista.innerHTML = "";
            document.getElementById('nomeSalaHistorico').innerText = sala;
            if (historicosPorSala[sala]) {
                historicosPorSala[sala].forEach(item => {
                    lista.innerHTML += `<div class="hist-item"><div><b>${item.texto}</b> <small>(${item.hora})</small></div><button class="btn-rechamada" onclick="enviarParaFirebase('${item.texto}')">RECHAMAR</button></div>`;
                });
            }
        }

        function atualizarEntregues() {
            const d = {
                normal: parseInt(document.getElementById('inputNormal').value) || 0,
                pref: parseInt(document.getElementById('inputPref').value) || 0,
                coleta: parseInt(document.getElementById('inputColeta').value) || 0,
                odonto: parseInt(document.getElementById('inputOdonto').value) || 0
            };
            database.ref('acolhimento').set(d).then(() => mostrarToast("Senhas sincronizadas!"));
        }

        // FUNÇÕES DE AVISO RESTAURADAS
        function salvarAvisoTV() {
            const msg = document.getElementById('inputAvisoUnidade').value.trim();
            const cor = document.getElementById('corAviso').value;
            const key = document.getElementById('editAvisoKey').value;
            if(!msg) return;
            if(key) {
                database.ref('avisos_unidade/' + key).update({msg, cor}).then(() => {
                    document.getElementById('editAvisoKey').value = "";
                    document.getElementById('btnSalvarAviso').innerText = "💾 SALVAR AVISO";
                    mostrarToast("Aviso alterado!");
                });
            } else {
                database.ref('avisos_unidade').push({msg, cor}).then(() => mostrarToast("Aviso criado!"));
            }
            document.getElementById('inputAvisoUnidade').value = "";
        }

        function atualizarListaAvisos() {
            database.ref('avisos_unidade').on('value', snap => {
                const container = document.getElementById('listaAvisosGerencia');
                container.innerHTML = "<b>Avisos Ativos:</b><br>";
                snap.forEach(child => {
                    const data = child.val();
                    container.innerHTML += `
                    <div class="aviso-item-gerencia">
                        <div><span style="color:${data.cor}">●</span> ${data.msg}</div>
                        <div>
                            <button onclick="prepararEdicao('${child.key}', '${data.msg}', '${data.cor}')">✏️</button>
                            <button onclick="excluirAviso('${child.key}')">❌</button>
                        </div>
                    </div>`;
                });
            });
        }
        function prepararEdicao(key, msg, cor) {
            document.getElementById('inputAvisoUnidade').value = msg;
            document.getElementById('corAviso').value = cor;
            document.getElementById('editAvisoKey').value = key;
            document.getElementById('btnSalvarAviso').innerText = "💾 SALVAR ALTERAÇÃO";
        }
        function excluirAviso(key) { if(confirm("Excluir este aviso?")) database.ref('avisos_unidade/'+key).remove(); }

        function resetContadores() {
            if(confirm("Zerar senhas do dia?")) {
                const pass = prompt("Senha:");
                if(btoa(pass) === "YWVyb3JhbmNob2l2") {
                    database.ref('contador').set({ NORMAL: 0, PREFERENCIAL: 0, COLETA: 0, ODONTO: 0 });
                    database.ref('acolhimento').set({ normal: 0, pref: 0, coleta: 0, odonto: 0 });
                    mostrarToast("Resetado!");
                }
            }
        }
    </script>
</body>
</html>
