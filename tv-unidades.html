<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV - USF Aero Rancho IV</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background: #002b5c; color: white; font-family: sans-serif; text-align: center; height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden; }
        .topo { background: #001a38; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid #ffcc00; }
        .unidade-nome { font-size: 1.8rem; font-weight: bold; text-align: left; }
        .area-tempo { text-align: right; }
        .relogio { font-size: 2.5rem; color: #ffcc00; font-weight: bold; }
        .data-atual { font-size: 1rem; color: #ccc; }

        .conteudo-principal { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; position: relative; }
        #area-chamada { display: none; }
        .paciente { font-size: 8rem; font-weight: bold; color: #ffcc00; text-transform: uppercase; padding: 0 20px; text-shadow: 4px 4px 10px rgba(0,0,0,0.5); }
        .sala { font-size: 5rem; background: white; color: #002b5c; padding: 10px 60px; border-radius: 20px; display: inline-block; margin-top: 25px; font-weight: bold; border: 4px solid #ffcc00; }
        
        #painel-informativo { display: block; padding: 20px; }
        .card-info { background: white; color: #333; border-radius: 25px; padding: 45px; max-width: 85%; margin: 0 auto; border-left: 25px solid #007bff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #texto-info { font-size: 4rem; margin: 25px 0; font-weight: bold; }
        
        @keyframes flash { 0% { background-color: #002b5c; } 50% { background-color: #ffcc00; } 100% { background-color: #002b5c; } }
        .piscar-alerta { animation: flash 0.8s ease-in-out 5; }
        
        .historico-tv { background: rgba(0,0,0,0.3); padding: 15px; display: flex; justify-content: center; gap: 40px; }
        .hist-item-tv { border-left: 4px solid #ffcc00; padding-left: 15px; text-align: left; }
    </style>
</head>
<body id="corpo-tv">
    <div id="aviso-inicial" onclick="this.style.display='none'" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; display:flex; flex-direction:column; justify-content:center; align-items:center; cursor:pointer;">
        <h1 style="color:#ffcc00;">TELA DA TV</h1>
        <button style="padding:20px 40px; font-size:1.5rem; font-weight:bold; cursor:pointer; border-radius:10px; border:none; background:#ffcc00; color:#002b5c;">CLIQUE PARA INICIAR SOM</button>
    </div>

    <div class="topo">
        <div class="unidade-nome">USF AERO RANCHO IV</div>
        <div class="area-tempo">
            <div id="relogio" class="relogio">00:00:00</div>
            <div id="data-atual" class="data-atual">--/--/----</div>
        </div>
    </div>

    <div class="conteudo-principal">
        <div id="area-chamada">
            <div id="txtPaciente" class="paciente">--</div>
            <div id="txtSala" class="sala">AGUARDE</div>
        </div>
        <div id="painel-informativo">
            <div class="card-info" id="card-cor">
                <h2 style="color:#666; margin:0;">INFORMATIVO</h2>
                <div id="texto-info">USF Aero Rancho IV</div>
            </div>
        </div>
    </div>

    <div id="painel-historico" class="historico-tv"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB-LPsGPEGcjMRPcEReNDQdgFWE5iE7Bh0",
            authDomain: "usf-aero-rancho-b6d85.firebaseapp.com",
            projectId: "usf-aero-rancho-b6d85",
            databaseURL: "https://usf-aero-rancho-b6d85-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const somCampainha = new Audio('https://assets.mixkit.co/active_storage/sfx/2861/2861-preview.mp3');
        
        let filaDeEspera = [];
        let processandoChamada = false;
        let histTv = [];

        database.ref('fila_chamadas').on('child_added', (snap) => {
            filaDeEspera.push(snap.val());
            database.ref('fila_chamadas/' + snap.key).remove();
            if (!processandoChamada) iniciarFila();
        });

        async function iniciarFila() {
            if (filaDeEspera.length === 0) { processandoChamada = false; document.getElementById('area-chamada').style.display = 'none'; document.getElementById('painel-informativo').style.display = 'block'; return; }
            processandoChamada = true;
            const atual = filaDeEspera.shift();
            document.getElementById('area-chamada').style.display = 'block';
            document.getElementById('painel-informativo').style.display = 'none';
            document.getElementById('txtPaciente').innerText = atual.msg;
            document.getElementById('txtSala').innerText = atual.local;
            
            document.body.classList.remove('piscar-alerta'); void document.body.offsetWidth; document.body.classList.add('piscar-alerta');
            somCampainha.play().catch(e => {});
            atualizarHistTV(atual.msg, atual.local);
            await falarTexto(atual.msg, atual.local);
            setTimeout(iniciarFila, 4000);
        }

        function falarTexto(nome, local) {
            return new Promise((resolve) => {
                window.speechSynthesis.cancel();
                let localLower = local.toLowerCase();
                // Correção de concordância para Auditório (AO) e Salas (À)
                let prep = (localLower.includes("recepção") || localLower.includes("sala") || localLower.includes("triagem")) ? "à" : "ao";
                let texto = nome.toUpperCase().includes("SENHA") ? `Atenção. ${nome}. Comparecer ${prep} ${local}` : `Atenção. Paciente ${nome}. Dirija-se ${prep} ${local}`;
                const fala = new SpeechSynthesisUtterance(texto);
                fala.lang = 'pt-BR'; fala.rate = 0.9;
                fala.onend = () => resolve(); window.speechSynthesis.speak(fala);
                setTimeout(resolve, 8000);
            });
        }

        function atualizarHistTV(msg, local) {
            histTv.unshift({msg, local}); if(histTv.length > 4) histTv.pop();
            const p = document.getElementById('painel-historico'); p.innerHTML = "";
            histTv.forEach(h => { p.innerHTML += `<div class="hist-item-tv"><b>${h.msg}</b><br><small>${h.local}</small></div>`; });
        }

        setInterval(() => { 
            const agora = new Date();
            document.getElementById('relogio').innerText = agora.toLocaleTimeString('pt-BR');
            document.getElementById('data-atual').innerText = agora.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        }, 1000);
    </script>
</body>
</html>
